[package]
name = "rust-api"
version = "0.1.0"
edition = "2024"

[dependencies]
actix-web = "4.12.0"
anyhow = "1.0.100"
clap = { version = "4.5.53", features = ["derive"] }
log = "0.4.28"
simple_logger = "5.1.0"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }

# The profile that 'dist' will build with
[profile.dist]
inherits = "release"
lto = "thin"
